services:
  nats:
    image: nats:linux
    platform: linux/arm64/v8
    command: -js
    expose:
      - "4222"
      - "8222"
    volumes:
      - ./storage/jetstream:/tmp/nats/jetstream
    networks:
      - general

  gateway:
    build:
      context: ./gateway
    # deploy:
    #   mode: replicated
    #   replicas: 4
    expose:
      - "3000"
    environment:
      PORT: "3000"
      NATS_URL: "nats://nats:4222"
    depends_on:
      - nats
    networks:
      - general
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  fb-collector:
    build:
      context: ./fb-collector
    expose:
      - "4010"
    environment:
      PORT: "4010"
      NATS_URL: "nats://nats:4222"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - general

  publisher:
    image: andriiuni/events
    platform: linux/arm64/v8
    environment:
      EVENT_ENDPOINT: "http://gateway:3000/events"
    depends_on:
      - fb-collector
    networks:
      - general

networks:
  general:
