services:
  nats:
    image: nats:linux
    platform: linux/arm64/v8
    command: -js
    expose:
      - "4222"
      - "8222"
    volumes:
      - ./storage/jetstream:/tmp/nats/jetstream
    networks:
      - general

  gateway:
    build:
      context: ./gateway
    # deploy:
    #   mode: replicated
    #   replicas: 4
    expose:
      - "3000"
    environment:
      PORT: "3000"
      NATS_URL: "${NATS_URL}"
    depends_on:
      - nats
    networks:
      - general
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres:
    image: "postgres:${POSTGRES_VERSION}"
    platform: linux/arm64/v8
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    ports:
      - "5432:5432"
    volumes:
      - ./storage/postgresql:/var/lib/postgresql/data
    networks:
      - general
    healthcheck:
      test: "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  fb-collector:
    build:
      context: ./fb-collector
    environment:
      NATS_URL: "${NATS_URL}"
      DATABASE_URL: "${DATABASE_URL}?schema=facebook"
    depends_on:
      gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - general

  ttk-collector:
    build:
      context: ./ttk-collector
    environment:
      NATS_URL: "${NATS_URL}"
      DATABASE_URL: "${DATABASE_URL}?schema=tiktok"
    depends_on:
      gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - general

  publisher:
    image: andriiuni/events
    platform: linux/arm64/v8
    environment:
      EVENT_ENDPOINT: "http://gateway:3000/events"
    depends_on:
      - fb-collector
      - ttk-collector
    networks:
      - general

networks:
  general:
